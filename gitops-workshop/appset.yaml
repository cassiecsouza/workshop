apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: frontend-appset-cassieatt6240
spec:
  generators:
    - git:
        repoURL: {{.repo_url}}
        revision: main
        files:
        - path: "gitops-workshop/cluster-config/**/config.json"
  template:
    metadata:
      name: '{{.username}}-{{.environment}}-frontend'
      labels:
        harness.io/envRef: '{{.environment}}'
        harness.io/serviceRef: '{{.harness_service}}'
        harness.io/buildRef: '{{.image_tag}}'
    spec:
      project: a6a728ad
      source:
        repoURL: {{.repo_url}}
        targetRevision: main
        path: "gitops-workshop/kustomize/frontend"
        kustomize:
          images:
          - cassiesouza/workshop:{{.image_tag}}
      destination:
        server: '{{.server_address}}'
        namespace: '{{.username}}-{{.environment}}'
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - PruneLast=true
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - Replace=true

